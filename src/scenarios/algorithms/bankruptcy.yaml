algorithm:
  name: "Банкротство физических лиц — бесплатная консультация"
  direction: "bankruptcy"
  version: "2.0"
  is_paid: false

  steps:
    - id: "greeting"
      type: "text"
      content: |
        Добрый день! Меня зовут <b>Антон</b>, я здесь, чтобы помочь вам найти ответы на волнующие вопросы.

        Банкротство — сложная ситуация, но она разрешима. Мы видим сотни таких случаев ежегодно и находим правильные решения. Ваши финансы, будущее и свобода зависят от правильных действий.

        Давайте разберёмся в вашей ситуации 👇
      next_step: "problem_quiz"

    - id: "problem_quiz"
      type: "question"
      content: "Какая проблема вас беспокоит?"
      buttons:
        - text: "💳 Крупная задолженность по кредитам"
          value: "debt_credits"
          next_step: "readiness_quiz"
        - text: "🏠 Не могу погасить ипотеку"
          value: "debt_mortgage"
          next_step: "readiness_quiz"
        - text: "🔒 Заблокированы счета и аресты"
          value: "blocked_accounts"
          next_step: "readiness_quiz"
        - text: "📋 Хочу признать себя банкротом"
          value: "voluntary_bankruptcy"
          next_step: "readiness_quiz"

    - id: "readiness_quiz"
      type: "question"
      content: "Оцените вашу готовность к действиям:"
      buttons:
        - text: "🔥 Готов(а) действовать немедленно"
          value: "ready_now"
          next_step: "significance_quiz"
        - text: "🤔 Размышляю и оцениваю ситуацию"
          value: "thinking"
          next_step: "significance_quiz"
        - text: "📋 Только собираю информацию"
          value: "just_info"
          next_step: "significance_quiz"

    - id: "significance_quiz"
      type: "question"
      content: "Насколько важна для вас эта проблема?"
      buttons:
        - text: "⚡ Критично — нужно решить немедленно"
          value: "critical"
          next_step: "free_offer"
        - text: "⏳ Важно, но терпит некоторое время"
          value: "important"
          next_step: "free_offer"
        - text: "📌 Обычная ситуация, не критично"
          value: "normal"
          next_step: "free_offer"

    - id: "free_offer"
      type: "text"
      content: |
        Поскольку ваша ситуация требует особого подхода, мы проводим <b>уникальную акцию — бесплатную консультацию по банкротству</b>. Такой шанс появляется редко, воспользуйтесь им!

        ✅ Консультация полностью бесплатна
        ✅ Индивидуальный разбор вашей ситуации
        ✅ Конкретный план действий

        💡 Если после консультации вы закажете любую нашу услугу (полное представительство, подготовка документов + сопровождение или только документ) — консультация остаётся бесплатной. Вы оплачиваете только работу по договору.
      next_step: "success_cases"

    - id: "success_cases"
      type: "question"
      content: "Хотите увидеть, как мы помогли десяткам людей вернуться к нормальной жизни?"
      buttons:
        - text: "✅ Да, покажите кейс"
          value: "show_case"
          next_step: "case_display"
        - text: "➡ Перейти к записи"
          value: "skip_case"
          next_step: "contact_collection"

    - id: "case_display"
      type: "text"
      content: |
        📌 <b>Кейс: Списание долга в 3,2 млн рублей</b>

        Клиент обратился с долгами перед 4 банками. Коллекторы звонили ежедневно, счета были заблокированы.

        ✅ Мы провели анализ ситуации
        ✅ Подготовили документы для суда
        ✅ Представляли интересы клиента в арбитражном суде
        ✅ Итог: полное списание долга за 8 месяцев

        Клиент вернулся к нормальной жизни без долгов. 🎉

        Мы готовы помочь и вам!
      next_step: "contact_collection"

    - id: "contact_collection"
      type: "contact"
      content: |
        📝 Чтобы мы могли помочь вам быстрее, оставьте, пожалуйста, ваши контактные данные. Мы свяжемся с вами в ближайшее время.

        Нажмите кнопку «📱 Поделиться контактом» или отправьте сообщение в формате:
        <b>Имя Фамилия, +7XXXXXXXXXX</b>
      next_step: "confirmation"

    - id: "confirmation"
      type: "end"
      content: |
        ✅ <b>Спасибо! Ваша заявка на бесплатную консультацию принята!</b>

        📋 Направление: Банкротство физических лиц
        💰 Стоимость консультации: <b>БЕСПЛАТНО</b>
        👤 Ваши контакты сохранены

        Наш юрист свяжется с вами в ближайшее время для назначения удобного времени консультации.

        🔒 Гарантируем полную конфиденциальность ваших данных.

        /start — Новая консультация
        /help — Справка
      final_step: true
