algorithm:
  name: "Адвокат по уголовным делам — платная консультация"
  direction: "criminal"
  version: "2.0"
  is_paid: true
  price: 5000

  steps:
    - id: "greeting"
      type: "text"
      content: |
        Здравствуйте! Я <b>Алексей</b>, ваш помощник по уголовно-правовым вопросам.

        Уголовные дела — это вопрос свободы и репутации. Действовать нужно быстро и грамотно. Мы поможем.
      next_step: "problem_quiz"

    - id: "problem_quiz"
      type: "question"
      content: "Вам угрожают уголовным преследованием?"
      buttons:
        - text: "⚖ Обвиняют в совершении преступления"
          value: "accused"
          next_step: "readiness_quiz"
        - text: "🔍 Подозреваемый / обвиняемый"
          value: "suspect"
          next_step: "readiness_quiz"
        - text: "👤 Потерпевший / свидетель"
          value: "victim"
          next_step: "readiness_quiz"
        - text: "⏳ Ожидание суда / исполнение наказания"
          value: "court_pending"
          next_step: "readiness_quiz"

    - id: "readiness_quiz"
      type: "question"
      content: "Оцените вашу готовность к действиям:"
      buttons:
        - text: "🔥 Готов(а) защитить права немедленно"
          value: "ready_now"
          next_step: "significance_quiz"
        - text: "🤔 Не знаю, как реагировать"
          value: "thinking"
          next_step: "significance_quiz"
        - text: "📋 Жду, следуя предписаниям"
          value: "just_info"
          next_step: "significance_quiz"

    - id: "significance_quiz"
      type: "question"
      content: "Насколько важна для вас эта проблема?"
      buttons:
        - text: "⚡ Свобода и репутация — наивысшая"
          value: "critical"
          next_step: "paid_value"
        - text: "⏳ Болезненно, средне важная"
          value: "important"
          next_step: "paid_value"
        - text: "📌 Воспринимаю поверхностно"
          value: "normal"
          next_step: "paid_value"

    - id: "paid_value"
      type: "text"
      content: |
        Наши адвокаты по уголовным делам имеют <b>многолетний опыт</b> защиты на всех стадиях уголовного процесса. Мы работаем быстро и конфиденциально.

        💡 Если после консультации вы закажете услугу — консультация бесплатна.
      next_step: "success_cases"

    - id: "success_cases"
      type: "question"
      content: "Хотите увидеть пример успешной защиты?"
      buttons:
        - text: "✅ Да, покажите"
          value: "show_case"
          next_step: "case_display"
        - text: "➡ Перейти к записи"
          value: "skip_case"
          next_step: "contact_collection"

    - id: "case_display"
      type: "text"
      content: |
        📌 <b>Кейс: Прекращение уголовного дела</b>

        Клиента обвиняли в мошенничестве (ст. 159 УК РФ). Грозило до 6 лет лишения свободы.

        ✅ Собраны доказательства невиновности
        ✅ Выявлены нарушения следствия
        ✅ Дело прекращено на стадии следствия
        ✅ Срок работы: 2 месяца

        Свобода клиента была защищена! 💪
      next_step: "contact_collection"

    - id: "contact_collection"
      type: "contact"
      content: |
        📝 Для записи на консультацию оставьте контактные данные.

        Нажмите «📱 Поделиться контактом» или отправьте:
        <b>Имя Фамилия, +7XXXXXXXXXX</b>
      next_step: "confirmation"

    - id: "confirmation"
      type: "end"
      content: |
        ✅ <b>Заявка принята!</b>

        📋 Направление: Уголовные дела
        💰 Стоимость консультации: 5 000 ₽

        Менеджер свяжется с вами в ближайшее время.

        🔒 Гарантируем полную конфиденциальность.

        /start — Новая консультация
      final_step: true
