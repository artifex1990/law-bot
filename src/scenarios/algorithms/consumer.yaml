algorithm:
  name: "Защита прав потребителей - платная консультация"
  direction: "consumer"
  version: "2.0"
  is_paid: true
  price: 5000

  steps:
    - id: "greeting"
      type: "text"
      content: |
        Здравствуйте! Я <b>Алексей</b>, ваш помощник по вопросам защиты прав потребителей.

        Каждый покупатель имеет право на качественный товар и услугу. Мы поможем это право отстоять.
      next_step: "problem_quiz"

    - id: "problem_quiz"
      type: "question"
      content: "У вас есть проблемы с приобретённым товаром или услугой?"
      buttons:
        - text: "🔧 Товар ненадлежащего качества"
          value: "defective_product"
          next_step: "readiness_quiz"
        - text: "🛠 Некачественный ремонт техники"
          value: "bad_repair"
          next_step: "readiness_quiz"
        - text: "📋 Услуги не соответствуют договору"
          value: "bad_service"
          next_step: "readiness_quiz"
        - text: "💸 Проблема с возвратом денег"
          value: "refund_issue"
          next_step: "readiness_quiz"

    - id: "readiness_quiz"
      type: "question"
      content: "Оцените вашу готовность к действиям:"
      buttons:
        - text: "🔥 Готов(а) требовать компенсацию"
          value: "ready_now"
          next_step: "significance_quiz"
        - text: "🤔 Хочу получить разъяснения"
          value: "thinking"
          next_step: "significance_quiz"
        - text: "📋 Не вижу смысла напрягаться"
          value: "just_info"
          next_step: "significance_quiz"

    - id: "significance_quiz"
      type: "question"
      content: "Насколько важна для вас эта проблема?"
      buttons:
        - text: "⚡ Высокая - потрачены большие деньги"
          value: "critical"
          next_step: "paid_value"
        - text: "⏳ Средняя - товар можно заменить"
          value: "important"
          next_step: "paid_value"
        - text: "📌 Низкая - товар заменим"
          value: "normal"
          next_step: "paid_value"

    - id: "paid_value"
      type: "text"
      content: |
        Наши юристы по защите прав потребителей добиваются <b>полного возмещения</b> и неустоек. Мы знаем закон «О защите прав потребителей» досконально.

        💡 Если после консультации вы закажете услугу - консультация бесплатна.
      next_step: "success_cases"

    - id: "success_cases"
      type: "question"
      content: "Хотите увидеть пример успешного дела?"
      buttons:
        - text: "✅ Да, покажите"
          value: "show_case"
          next_step: "case_display"
        - text: "➡ Перейти к записи"
          value: "skip_case"
          next_step: "contact_collection"

    - id: "case_display"
      type: "text"
      content: |
        📌 <b>Кейс: Возврат 250 000 ₽ за бракованный автомобиль</b>

        Клиент купил авто с заводским дефектом. Дилер отказывал в замене.

        ✅ Проведена независимая экспертиза
        ✅ Выиграно дело в суде
        ✅ Полный возврат средств + неустойка + штраф
        ✅ Срок: 3 месяца
      next_step: "contact_collection"

    - id: "contact_collection"
      type: "contact"
      content: |
        📝 Для записи на консультацию оставьте контактные данные.

        Нажмите «📱 Поделиться контактом» или отправьте:
        <b>Имя Фамилия, +7XXXXXXXXXX</b>
      next_step: "confirmation"

    - id: "confirmation"
      type: "end"
      content: |
        ✅ <b>Заявка принята!</b>

        📋 Направление: Защита прав потребителей
        💰 Стоимость консультации: 5 000 ₽

        Менеджер свяжется с вами в ближайшее время.

        /start - Новая консультация
      final_step: true
