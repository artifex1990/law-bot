algorithm:
  name: "Налоговый юрист - платная консультация"
  direction: "tax"
  version: "2.0"
  is_paid: true
  price: 5000

  steps:
    - id: "greeting"
      type: "text"
      content: |
        Здравствуйте! Я <b>Алексей</b>, ваш помощник по налоговым вопросам.

        Налоговые проблемы требуют точных решений. Мы поможем оптимизировать и защитить ваши интересы.
      next_step: "problem_quiz"

    - id: "problem_quiz"
      type: "question"
      content: "Вас интересуют вопросы налогообложения?"
      buttons:
        - text: "🔍 Налоговая проверка выявила нарушения"
          value: "tax_audit"
          next_step: "readiness_quiz"
        - text: "📋 Проблемы с декларацией"
          value: "declaration"
          next_step: "readiness_quiz"
        - text: "💰 Увеличилась налоговая ставка"
          value: "rate_increase"
          next_step: "readiness_quiz"
        - text: "🏠 Претензии по имущественному налогу"
          value: "property_tax"
          next_step: "readiness_quiz"

    - id: "readiness_quiz"
      type: "question"
      content: "Оцените вашу готовность к действиям:"
      buttons:
        - text: "🔥 Готов(а) заявить о нарушениях"
          value: "ready_now"
          next_step: "significance_quiz"
        - text: "🤔 Хочу рекомендации по оптимизации"
          value: "thinking"
          next_step: "significance_quiz"
        - text: "📋 Минимум активности"
          value: "just_info"
          next_step: "significance_quiz"

    - id: "significance_quiz"
      type: "question"
      content: "Насколько важна для вас эта проблема?"
      buttons:
        - text: "⚡ Большие начисления - значительная нагрузка"
          value: "critical"
          next_step: "paid_value"
        - text: "⏳ Среднее влияние на бюджет"
          value: "important"
          next_step: "paid_value"
        - text: "📌 Низкая чувствительность"
          value: "normal"
          next_step: "paid_value"

    - id: "paid_value"
      type: "text"
      content: |
        Наши налоговые юристы работают с <b>ФНС, арбитражными судами</b> и владеют современными методами налоговой оптимизации.

        💡 Если после консультации вы закажете услугу - консультация бесплатна.
      next_step: "success_cases"

    - id: "success_cases"
      type: "question"
      content: "Хотите увидеть пример успешного дела?"
      buttons:
        - text: "✅ Да, покажите"
          value: "show_case"
          next_step: "case_display"
        - text: "➡ Перейти к записи"
          value: "skip_case"
          next_step: "contact_collection"

    - id: "case_display"
      type: "text"
      content: |
        📌 <b>Кейс: Отмена доначислений на 4,7 млн ₽</b>

        По итогам проверки ФНС доначислила налоги и штрафы. Компания не согласилась с результатами.

        ✅ Обжалование решения в УФНС
        ✅ Представительство в арбитражном суде
        ✅ Полная отмена доначислений
        ✅ Срок: 6 месяцев
      next_step: "contact_collection"

    - id: "contact_collection"
      type: "contact"
      content: |
        📝 Для записи на консультацию оставьте контактные данные.

        Нажмите «📱 Поделиться контактом» или отправьте:
        <b>Имя Фамилия, +7XXXXXXXXXX</b>
      next_step: "confirmation"

    - id: "confirmation"
      type: "end"
      content: |
        ✅ <b>Заявка принята!</b>

        📋 Направление: Налоговый юрист
        💰 Стоимость консультации: 5 000 ₽

        Менеджер свяжется с вами в ближайшее время.

        /start - Новая консультация
      final_step: true
