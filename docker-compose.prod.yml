# Продакшен: PostgreSQL, бот (вебхуки Telegram + MAX, API), Nginx TLS, Uptime Kuma.
# См. docs/DEPLOYMENT.md
#
# Сборка: docker compose -f docker-compose.prod.yml build
# Образ из registry: задайте BOT_IMAGE_REF в .env на сервере
#
# Веб-UI БД (опционально): docker compose -f docker-compose.prod.yml --profile db-ui up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: legal_bot_db
    environment:
      POSTGRES_USER: ${DB_USER:-legal_bot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-legal_bot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Только localhost на VPS — удалённый доступ через SSH-туннель (см. README / DEPLOYMENT)
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-legal_bot} -d ${DB_NAME:-legal_bot}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bot_network
    restart: unless-stopped

  bot:
    # Полный ref, например ghcr.io/owner/law-bot:latest или :sha
    image: ${BOT_IMAGE_REF:-law-bot-local:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legal_bot
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-legal_bot}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-legal_bot}
      API_ENABLED: ${API_ENABLED:-true}
      API_HOST: 0.0.0.0
      API_PORT: "8080"
      TELEGRAM_USE_WEBHOOK: ${TELEGRAM_USE_WEBHOOK:-true}
      MAX_USE_WEBHOOK: ${MAX_USE_WEBHOOK:-false}
      WEBHOOK_LISTEN_HOST: 0.0.0.0
      WEBHOOK_PORT: "8443"
      MAX_WEBHOOK_LISTEN_HOST: 0.0.0.0
      MAX_WEBHOOK_PORT: "8444"
    volumes:
      - bot_logs:/app/logs
      - bot_backups:/app/backups
    expose:
      - "8080"
      - "8443"
      - "8444"
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-fsS",
          "http://127.0.0.1:8080/v1/health/live",
        ]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 120s
    networks:
      - bot_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: legal_bot_nginx
    depends_on:
      - bot
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
      # ACME webroot для выпуска/продления сертификата Let's Encrypt
      - certbot_www:/var/www/certbot:ro
    # Перезагрузка раз в 6 часов — подхватывает обновлённый сертификат (certbot renew)
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"
    networks:
      - bot_network
    restart: unless-stopped

  # Автоматический выпуск/продление TLS-сертификата (Let's Encrypt, webroot).
  # Первый выпуск: scripts/init-letsencrypt.sh. Дальше контейнер сам продлевает
  # сертификат и копирует свежие PEM в ./deploy/ssl (--deploy-hook), nginx их перечитывает.
  certbot:
    image: certbot/certbot
    container_name: legal_bot_certbot
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/lib/letsencrypt
      - certbot_www:/var/www/certbot
      - ./deploy/ssl:/ssl
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "trap exit TERM; while :; do certbot renew --deploy-hook 'cp -L /etc/letsencrypt/live/${CERTBOT_DOMAIN:-max.demyanovblog.ru}/fullchain.pem /ssl/fullchain.pem && cp -L /etc/letsencrypt/live/${CERTBOT_DOMAIN:-max.demyanovblog.ru}/privkey.pem /ssl/privkey.pem'; sleep 12h & wait $${!}; done"
    networks:
      - bot_network
    restart: unless-stopped

  # Обязательный визуальный мониторинг HTTP (дашборды, алерты). Только 127.0.0.1 — см. DEPLOYMENT.md
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: legal_bot_uptime_kuma
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "127.0.0.1:${UPTIME_KUMA_PORT:-3001}:3001"
    networks:
      - bot_network
    depends_on:
      bot:
        condition: service_healthy
    restart: unless-stopped

  # Лёгкий веб-UI для PostgreSQL (только localhost). Включение: --profile db-ui
  adminer:
    image: adminer:4
    container_name: legal_bot_adminer
    profiles:
      - db-ui
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    networks:
      - bot_network
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${ADMINER_HOST_PORT:-8888}:8080"
    restart: unless-stopped

volumes:
  postgres_data:
  bot_logs:
  bot_backups:
  uptime_kuma_data:
  certbot_etc:
  certbot_var:
  certbot_www:

networks:
  bot_network:
    name: legal_bot_network
    driver: bridge
