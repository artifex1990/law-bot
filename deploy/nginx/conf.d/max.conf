upstream law_bot_max {
    server bot:8444;
}

# HTTP: ACME-челлендж Let's Encrypt + редирект на HTTPS
server {
    listen 80;
    server_name max.demyanovblog.ru;

    # Certbot webroot (scripts/init-letsencrypt.sh, сервис certbot в compose)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name bot.dev.ru;

    # Сертификаты копируются сюда из Let's Encrypt (см. certbot --deploy-hook)
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff always;

    # MAX webhook (maxapi); путь = MAX_WEBHOOK_PATH, по умолчанию /max/webhook
    location /max/webhook {
        proxy_pass http://law_bot_max;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Max-Bot-Api-Secret $http_x_max_bot_api_secret;
    }

    # Health MAX (внутри контейнера: /health/live, /health/ready на 8444)
    location = /max/health/live {
        proxy_pass http://law_bot_max/health/live;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /max/health/ready {
        proxy_pass http://law_bot_max/health/ready;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
