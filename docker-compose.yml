services:
  postgres:
    image: postgres:15-alpine
    container_name: legal_bot_db
    environment:
      POSTGRES_USER: ${DB_USER:-legal_bot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-legal_bot_pass}
      POSTGRES_DB: ${DB_NAME:-legal_bot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-legal_bot} -d ${DB_NAME:-legal_bot}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bot_network

  telegram_bot:
    build: .
    container_name: legal_telegram_bot
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      MAX_BOT_TOKEN: ${MAX_BOT_TOKEN}
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-legal_bot}:${DB_PASSWORD:-legal_bot_pass}@postgres:5432/${DB_NAME:-legal_bot}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./logs:/app/logs
      - ./src/scenarios:/app/src/scenarios
    restart: unless-stopped
    networks:
      - bot_network

volumes:
  postgres_data:

networks:
  bot_network:
    driver: bridge
